<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E091C">
<title>BLOCKBEAT — the chain, performed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* --- Monad design system palette ----------------------------------- */
    --navy:#0E091C;        /* Monad Dark Navy    */
    --purple:#6E54FF;      /* Monad Purple       */
    --lpurple:#DDD7FE;     /* Monad Light Purple */
    --cyan:#85E6FF;        /* Monad Cyan         */
    --lblue:#B9E3F9;       /* Monad Light Blue   */
    --pink:#FF8EE4;        /* Monad Pink         */
    --orange:#FFAE45;      /* Monad Orange       */

    --text:#ECEAFB;
    --muted:#6f6a90;
    --faint:#4a4470;
    --line:rgba(110,84,255,.18);

    --font-display:'Britti Sans','Inter',system-ui,sans-serif;
    --font-body:'Inter',system-ui,sans-serif;
    --font-mono:'Roboto Mono',ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:var(--navy);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  #gl{position:fixed;inset:0;display:block;width:100%;height:100%}

  .ui{position:fixed;inset:0;z-index:5;pointer-events:none}

  /* --- top bar -------------------------------------------------------- */
  .top{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:flex-start;justify-content:space-between;
    padding:22px 26px;
  }
  .brand{display:flex;align-items:center;gap:13px}
  .brand .mark{flex:none;filter:drop-shadow(0 0 12px rgba(110,84,255,.6))}
  .wm .name{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:.26em;line-height:1}
  .wm .name b{color:var(--purple);font-weight:700}
  .wm .sub{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.32em;color:var(--muted);margin-top:6px}

  .status{
    display:flex;align-items:center;gap:9px;
    font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;color:var(--muted);
    border:1px solid var(--line);background:rgba(255,255,255,.02);
    border-radius:999px;padding:7px 14px;
  }
  .status .dot{width:6px;height:6px;border-radius:50%;background:var(--faint);transition:background .3s,box-shadow .3s}
  .status.on .dot{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blip 1.6s ease-in-out infinite}
  @keyframes blip{0%,100%{opacity:1}50%{opacity:.35}}

  /* --- centre "now" frame / begin affordance -------------------------- */
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .nowframe{
    pointer-events:auto;
    width:92px;height:92px;border-radius:16px;
    border:1px solid rgba(110,84,255,.45);
    background:transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .2s,box-shadow .2s,transform .2s;
  }
  .nowframe:hover{border-color:var(--purple);box-shadow:0 0 34px rgba(110,84,255,.4)}
  .nowframe:focus-visible{outline:2px solid var(--purple);outline-offset:4px}
  .play{
    width:0;height:0;border-style:solid;border-width:8px 0 8px 14px;
    border-color:transparent transparent transparent var(--lpurple);
    margin-left:3px;filter:drop-shadow(0 0 8px rgba(221,215,254,.5));
  }
  .startlabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.34em;color:var(--muted);animation:fadepulse 2.2s ease-in-out infinite}
  @keyframes fadepulse{0%,100%{opacity:.4}50%{opacity:.9}}
  .scrim{position:absolute;inset:0;background:rgba(14,9,28,.5);pointer-events:auto;transition:opacity .5s ease}
  body.playing .scrim{opacity:0;pointer-events:none}
  body.playing .play,body.playing .startlabel{display:none}

  /* --- bottom: readout + controls ------------------------------------- */
  .bottom{
    position:absolute;left:0;right:0;bottom:0;
    display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
    padding:22px 26px;
  }
  .readout{display:flex;flex-wrap:wrap;gap:14px 34px}
  .item .k{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.22em;color:var(--faint)}
  .item .v{font-family:var(--font-mono);font-size:12.5px;letter-spacing:.04em;color:var(--text);margin-top:5px;white-space:nowrap}

  .controls{display:flex;gap:11px;flex:none}
  .btn{
    pointer-events:auto;font-family:var(--font-mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;
    padding:12px 18px;border-radius:9px;border:1px solid var(--line);cursor:pointer;
    transition:background .15s,border-color .15s,color .15s,box-shadow .15s,opacity .15s;
  }
  .btn.send{background:var(--lpurple);border-color:var(--lpurple);color:var(--navy);font-weight:600}
  .btn.send:hover{background:#fff;border-color:#fff;box-shadow:0 8px 32px -8px rgba(221,215,254,.6)}
  .btn.stop{background:rgba(255,255,255,.03);color:var(--muted)}
  .btn.stop:hover{border-color:var(--purple);color:var(--text)}
  .btn:disabled{opacity:.35;cursor:default;box-shadow:none}
  .btn:disabled:hover{background:var(--lpurple);border-color:var(--lpurple)}
  .btn.stop:disabled:hover{background:rgba(255,255,255,.03);border-color:var(--line);color:var(--muted)}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="ui">
  <div class="scrim" id="scrim"></div>

  <header class="top">
    <div class="brand">
      <svg class="mark" width="26" height="26" viewBox="-50 -50 100 100" aria-hidden="true">
        <g transform="rotate(45)">
          <rect x="-34" y="-34" width="68" height="68" rx="17" fill="#6E54FF"/>
          <rect x="-13" y="-13" width="26" height="26" rx="7" fill="#0E091C"/>
        </g>
      </svg>
      <div class="wm">
        <div class="name"><b>BLOCK</b>BEAT</div>
        <div class="sub">THE CHAIN, PERFORMED</div>
      </div>
    </div>
    <div class="status" id="status">
      <span class="dot"></span>
      <span id="status-text">400MS · STANDBY</span>
    </div>
  </header>

  <div class="center" id="center">
    <button class="nowframe" id="begin" aria-label="Start"><span class="play"></span></button>
    <div class="startlabel">PRESS TO START</div>
  </div>

  <footer class="bottom">
    <div class="readout">
      <div class="item"><div class="k">NETWORK HEIGHT</div><div class="v" id="r-block">—</div></div>
      <div class="item"><div class="k">SIGNAL HASH</div><div class="v" id="r-hash">—</div></div>
      <div class="item"><div class="k">THROUGHPUT</div><div class="v" id="r-tx">—</div></div>
      <div class="item"><div class="k">NETWORK LOAD</div><div class="v" id="r-load">—</div></div>
      <div class="item"><div class="k">OSCILLATOR</div><div class="v" id="r-note">—</div></div>
    </div>
    <div class="controls">
      <button class="btn stop" id="btn-stop" disabled>▢ STOP</button>
    </div>
  </footer>
</div>

<script>
/* ============================================================================
   BLOCKBEAT — the chain as a generative instrument
   ----------------------------------------------------------------------------
   A PURE FUNCTION of a block stream: same blocks + same renderer -> identical
   sound and image, forever. The block stream is the LIVE Monad chain, polled
   over JSON-RPC (eth_getBlockByNumber). load = gasUsed/gasLimit, density = real
   tx count, pitch = real block hash. If the RPC is unreachable the piece falls
   back to a seeded simulator with Monad-like dynamics so it never goes silent.
   Endpoint overridable with ?rpc=<url> or ?chain=testnet.

   Visual system follows the Monad design system: Dark Navy ground, blueprint
   grid, a data-driven WebGL seismograph whose heat ramp runs Light Blue ->
   Purple -> Pink -> Orange with load. The newest block enters at the right edge
   and scrolls all the way to the left across the full width.
============================================================================ */

const BLOCK_MS = 400;        // Monad's real block time. the metronome.
const HIST = 44;             // blocks kept on screen (matches shader)
const LOAD_FULL = 0.16;      // gasUsed/gasLimit that maps to a full-height, hottest bar.
                             // Mainnet load runs ~3-15%, so this spreads that band across
                             // the full visual range instead of leaving every bar tiny/blue.

/* --- deterministic PRNG: same seed -> same stream ------------------------- */
function mulberry32(a){
  return function(){
    a|=0; a=a+0x6D2B79F5|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function hashToBytes(hex){
  const b=[]; for(let i=2;i<hex.length;i+=2) b.push(parseInt(hex.substr(i,2),16));
  return b;
}

let rng = mulberry32(0xBEEF1234);
let blockNum = 21_400_000;
let congestion = 0.12;

function nextBlock(forcedPulse){
  blockNum++;
  if(rng() < 0.012) congestion = Math.min(1, congestion + 0.4 + rng()*0.4); // spike
  congestion += (0.12 - congestion) * 0.06 + (rng()-0.5)*0.05;              // revert
  congestion = Math.max(0.02, Math.min(1, congestion));

  const base = 40 + Math.pow(congestion,1.6) * 3600;          // ~10k TPS * 0.4s at full tilt
  const txCount = Math.max(1, Math.round(base * (0.6 + rng()*0.8)));

  let hash='0x';
  for(let i=0;i<32;i++) hash += Math.floor(rng()*256).toString(16).padStart(2,'0');

  return { num:blockNum, hash, txCount, loadRaw:congestion, load:congestion, user:!!forcedPulse };
}

/* --- live Monad block source (primary) ----------------------------------- */
const RPC = { mainnet:'https://rpc.monad.xyz', testnet:'https://testnet-rpc.monad.xyz' };
const Q = new URLSearchParams(location.search);
const CHAIN = (Q.get('chain')||'mainnet').toLowerCase();
const RPC_URL = Q.get('rpc') || RPC[CHAIN] || RPC.mainnet;

let _rpcId = 1;
async function rpc(method, params){
  const r = await fetch(RPC_URL, {
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({jsonrpc:'2.0', id:_rpcId++, method, params})
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json();
  if(j.error) throw new Error(j.error.message||'rpc error');
  return j.result;
}
function fetchBlock(tag){ return rpc('eth_getBlockByNumber', [tag, false]); } // false = tx hashes only
function mapBlock(raw){
  const gasUsed = Number(raw.gasUsed||0), gasLimit = Number(raw.gasLimit||0)||1;
  const loadRaw = Math.max(0, Math.min(1, gasUsed/gasLimit));   // true network load (gasUsed/gasLimit)
  return {
    num: Number(raw.number),
    hash: raw.hash,
    txCount: raw.transactions ? raw.transactions.length : 0,
    loadRaw,
    load: Math.min(1, loadRaw/LOAD_FULL),                       // normalized to the operating band (drives bar size + color)
    user: false
  };
}

let live=false, lastNum=null, polling=false, pollTimer=null;
const queue=[];

// seed the scope with recent real blocks, then mark the stream live.
// Only the latest block is required; backfill is best-effort so a rate-limited
// burst can't kill the connect (throws only if the chain is fully unreachable).
async function connectLive(){
  const latest = await fetchBlock('latest');
  const ln = Number(latest.number);
  const N = Math.min(HIST, 24);
  const nums=[]; for(let n=ln-1; n>ln-N && n>=0; n--) nums.push(n);          // older blocks (descending)
  const settled = await Promise.allSettled(nums.map(n => fetchBlock('0x'+n.toString(16))));
  const olders = settled.filter(s => s.status==='fulfilled').map(s => s.value);
  const ordered = [latest, ...olders];                                       // newest-first
  history.length = 0;
  for(let i=ordered.length-1;i>=0;i--) pushHistory(mapBlock(ordered[i]));     // oldest first -> newest ends at front
  while(history.length < HIST) history.push({amp:0,load:0,user:false});
  texDirty = true;
  lastNum = ln; live = true;
  const newest = mapBlock(latest);
  targetLoad = loadDisp = newest.load;
  updateReadout(newest, blockToNotes(newest));
}

// poll for new blocks and enqueue them for the beat ticker to consume
async function pollOnce(){
  if(polling || !live) return; polling=true;
  try{
    const latest = await fetchBlock('latest');
    const ln = Number(latest.number);
    if(ln > lastNum){
      const from = Math.max(lastNum+1, ln-6);          // cap backfill so we never flood
      for(let n=from; n<=ln; n++){
        queue.push(n===ln ? latest : await fetchBlock('0x'+n.toString(16)));
      }
      lastNum = ln;
      if(queue.length > 8) queue.splice(0, queue.length-8); // stay near real-time if we fall behind
    }
  }catch(e){ /* transient hiccup; retry next poll */ }
  finally{ polling=false; }
}

/* --- musical mapping: a block -> notes (D minor pentatonic) --------------- */
const SCALE = ['D','F','G','A','C'];
const OCTAVES = [3,4,5];
const TENSION = ['Eb','Ab'];

function blockToNotes(block){
  const bytes = hashToBytes(block.hash);
  const density = 1 + Math.min(3, Math.floor(block.txCount / 900));
  const notes=[];
  for(let i=0;i<density;i++){
    const b = bytes[i % bytes.length];
    let name = SCALE[b % SCALE.length];
    let oct  = OCTAVES[(b>>3) % OCTAVES.length];
    if(block.load > 0.6 && (bytes[(i+5)%bytes.length] % 5 === 0)) name = TENSION[b % TENSION.length];
    notes.push(name+oct);
  }
  return notes;
}

/* --- audio engine (Tone.js) ---------------------------------------------- */
let audio=null;
function buildAudio(){
  if(typeof Tone==='undefined') return null;
  const reverb = new Tone.Reverb({decay:4.5, wet:0.32}).toDestination();
  const limiter = new Tone.Limiter(-2).connect(reverb);

  const lead = new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'triangle'},
    envelope:{attack:0.01,decay:0.3,sustain:0.15,release:1.2}
  }).connect(limiter);
  lead.volume.value=-12;

  const filter = new Tone.Filter(900,'lowpass').connect(limiter);
  const pulse = new Tone.MembraneSynth({
    pitchDecay:0.03, octaves:5,
    envelope:{attack:0.001,decay:0.32,sustain:0,release:0.2}
  }).connect(filter);
  pulse.volume.value=-9;

  const drone = new Tone.Synth({
    oscillator:{type:'sine'},
    envelope:{attack:1.2,decay:0.2,sustain:0.8,release:2}
  }).connect(reverb);
  drone.volume.value=-40;
  drone.triggerAttack('D2');

  return {lead,pulse,drone,filter,limiter,reverb};
}
function playBlock(block,notes){
  if(!audio) return;
  const t = Tone.now();
  audio.pulse.triggerAttackRelease('D1', '16n', t, 0.6 + block.load*0.4);
  audio.filter.frequency.rampTo(500 + block.load*5000, 0.3);
  audio.drone.volume.rampTo(-40 + block.load*26, 0.4);
  const vel = 0.25 + block.load*0.4 + (block.user?0.3:0);
  notes.forEach((n,i)=> audio.lead.triggerAttackRelease(n,'8n', t + i*0.045, Math.min(1,vel)));
}

/* --- heat ramp (DOM side, mirrors the shader) ---------------------------- */
function heatCss(load,a=1){
  const stops=[[185,227,249],[110,84,255],[255,142,228],[255,174,69]];
  const x=Math.max(0,Math.min(1,load))*(stops.length-1);
  const i=Math.floor(x), f=x-i;
  const c0=stops[i], c1=stops[Math.min(stops.length-1,i+1)];
  const r=Math.round(c0[0]+(c1[0]-c0[0])*f);
  const g=Math.round(c0[1]+(c1[1]-c0[1])*f);
  const b=Math.round(c0[2]+(c1[2]-c0[2])*f);
  return `rgba(${r},${g},${b},${a})`;
}

/* --- WebGL: blueprint grid + glow + data-driven seismograph --------------- */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

const VS = `attribute vec2 a_position;
void main(){ gl_Position = vec4(a_position,0.0,1.0); }`;

const FS = `precision highp float;
uniform vec2  u_resolution;
uniform float u_time;
uniform float u_load;
uniform float u_beat;
uniform float u_pulse;
uniform sampler2D u_hist;
const float HIST = ${HIST}.0;

#define BG     vec3(0.0549,0.0353,0.1098)
#define PURPLE vec3(0.431,0.329,1.0)
#define LBLUE  vec3(0.725,0.890,0.976)
#define PINK   vec3(1.0,0.557,0.894)
#define ORANGE vec3(1.0,0.682,0.271)
#define CYAN   vec3(0.522,0.902,1.0)

vec3 heat(float t){
  t = clamp(t,0.0,1.0);
  if(t<0.3333) return mix(LBLUE,PURPLE,t/0.3333);
  if(t<0.6666) return mix(PURPLE,PINK,(t-0.3333)/0.3333);
  return mix(PINK,ORANGE,(t-0.6666)/0.3334);
}

void main(){
  vec2 uv = gl_FragCoord.xy / u_resolution;
  float aspect = u_resolution.x / max(1.0,u_resolution.y);
  vec2 cd = (uv-0.5)*vec2(aspect,1.0);
  float d = length(cd);
  vec3 color = BG;

  // whole-screen shade pulses on every beat — brightest at the strike, decaying
  // out over the 400ms, tinted by load (calm = blue pulse, congested = orange)
  float beatPulse = pow(1.0 - u_beat, 1.8);
  color += heat(u_load) * beatPulse * (0.04 + 0.06*u_load);

  // central glow, breathes with the beat and swells with load
  float breathe = 0.6 + 0.4*(1.0-u_beat);
  color += PURPLE*(0.12/(d+0.55))*breathe*(0.45+0.85*u_load);
  color += CYAN*(0.10/(d+0.5))*u_pulse;

  // blueprint grid (aspect-correct square cells)
  float cells = 26.0;
  vec2 gv = vec2(uv.x*aspect, uv.y)*cells;
  vec2 gf = abs(fract(gv)-0.5);
  float gm = min(gf.x,gf.y);
  float lineMask = 1.0 - smoothstep(0.0,0.035,gm);
  color += PURPLE*lineMask*0.05;

  // seismograph: newest block enters at the right edge, scrolls all the way left (full width)
  float pos = (1.0-uv.x)*HIST - u_beat;
  if(pos >= 0.0 && pos < HIST){
    vec4 hs = texture2D(u_hist, vec2(pos/HIST, 0.5));
    float amp=hs.r, ld=hs.g, isUser=hs.b;
    float frac = fract(pos);
    float bar = 1.0 - smoothstep(0.18,0.30,abs(frac-0.5));
    float halfH = 0.045 + amp*0.34;
    float vdist = abs(uv.y-0.5);
    float within = step(vdist,halfH);
    float vfade = 1.0 - vdist/max(halfH,0.001);
    float age = 1.0 - pos/HIST;          // brightest at right (newest), fading to the left
    vec3 bcol = mix(heat(ld), CYAN, isUser);
    color += bcol*bar*within*vfade*age*0.85;
    float cap = (1.0 - smoothstep(0.0,0.014,abs(vdist-halfH)))*bar*age;
    color += bcol*cap*0.9;
  }
  // faint baseline across the full width
  color += PURPLE*(1.0-smoothstep(0.0,0.0022,abs(uv.y-0.5)))*0.10;

  // the "now" ring + dot at centre — the heartbeat made visible
  float rad = u_beat*0.16;
  float ringMask = 1.0 - smoothstep(0.0,0.006,abs(d-rad));
  color += heat(u_load)*ringMask*(1.0-u_beat)*0.8;
  color += CYAN*ringMask*u_pulse;
  float dot = 1.0 - smoothstep(0.0,0.012,d);
  color += mix(PURPLE,CYAN,u_pulse)*dot*(0.7+0.3*(1.0-u_beat));

  // scanline + vignette
  color *= 0.94 + 0.06*sin(uv.y*u_resolution.y*1.2);
  color *= 1.0 - 0.35*smoothstep(0.5,1.1,d);

  gl_FragColor = vec4(color,1.0);
}`;

let prog, uRes, uTime, uLoad, uBeat, uPulse, histTex;
const texData = new Uint8Array(HIST*4);

function compile(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
function initGL(){
  if(!gl) return false;
  prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog,'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);

  uRes=gl.getUniformLocation(prog,'u_resolution');
  uTime=gl.getUniformLocation(prog,'u_time');
  uLoad=gl.getUniformLocation(prog,'u_load');
  uBeat=gl.getUniformLocation(prog,'u_beat');
  uPulse=gl.getUniformLocation(prog,'u_pulse');

  histTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, histTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.uniform1i(gl.getUniformLocation(prog,'u_hist'), 0);
  return true;
}
function resize(){
  const dpr = Math.min(2, window.devicePixelRatio||1);
  const w = Math.round(canvas.clientWidth*dpr), h = Math.round(canvas.clientHeight*dpr);
  if(canvas.width!==w || canvas.height!==h){ canvas.width=w; canvas.height=h; }
}
window.addEventListener('resize', resize);

/* --- history buffer (newest first) --------------------------------------- */
const history = [];   // [{amp,load,user}]
let texDirty = true;
function pushHistory(block){
  history.unshift({ amp: block.load, load: block.load, user: block.user });   // bar height + color from normalized load
  if(history.length > HIST) history.pop();
  texDirty = true;
}
function uploadHistory(){
  for(let k=0;k<HIST;k++){
    const o = history[k] || {amp:0,load:0,user:false};
    texData[k*4+0] = Math.round(o.amp*255);
    texData[k*4+1] = Math.round(o.load*255);
    texData[k*4+2] = o.user ? 255 : 0;
    texData[k*4+3] = 255;
  }
  gl.bindTexture(gl.TEXTURE_2D, histTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,HIST,1,0,gl.RGBA,gl.UNSIGNED_BYTE,texData);
  texDirty = false;
}

/* --- transport ----------------------------------------------------------- */
const $=id=>document.getElementById(id);
let running=false, lastTick=0, targetLoad=0.12, loadDisp=0.12, pulseEnv=0;

function updateReadout(block,notes){
  $('r-block').textContent = 'BLOCK #'+block.num.toLocaleString();
  $('r-hash').textContent  = block.hash.slice(0,4)+'…'+block.hash.slice(-3);
  $('r-tx').textContent    = 'TX: '+block.txCount.toLocaleString();
  const pct = Math.round((block.loadRaw!=null?block.loadRaw:block.load)*100);   // show TRUE load %
  const el = $('r-load');
  el.textContent = pct+'%';
  el.style.color = heatCss(block.load,1);                                       // color from normalized load
  $('r-note').textContent = 'NOTE: '+(block.user?'★ ':'')+notes.join(' ');
}

function setStatus(t){ $('status-text').textContent = t; }

function beatTick(){
  let block;
  if(live){
    const raw = queue.shift();
    if(!raw) return;                 // no new Monad block this beat — hold (silent)
    block = mapBlock(raw);
  }else{
    block = nextBlock(false);        // simulator fallback (RPC offline)
  }
  const notes = blockToNotes(block);
  if(audio) playBlock(block,notes);
  pushHistory(block);
  targetLoad = block.load;
  lastTick = performance.now();
  updateReadout(block,notes);
}

let timer=null;
async function startTransport(){
  if(running) return;
  running=true;
  document.body.classList.add('playing');
  $('center').classList.add('live');
  $('status').classList.add('on');
  $('btn-stop').disabled=false;
  setStatus('CONNECTING…');
  try{
    await connectLive();
    setStatus('LIVE · '+CHAIN.toUpperCase());
    clearInterval(pollTimer); pollTimer=setInterval(pollOnce, 250);
  }catch(e){
    live=false;
    console.warn('Monad RPC unavailable — falling back to simulator:', e);
    setStatus('SIM · RPC OFFLINE');
  }
  lastTick=performance.now();
  clearInterval(timer); timer=setInterval(beatTick, BLOCK_MS);
  if(!live) beatTick();              // sim starts instantly; live waits for the next block
}
function stop(){
  running=false;
  clearInterval(timer); timer=null;
  clearInterval(pollTimer); pollTimer=null;
  if(audio){ audio.drone.triggerRelease(); audio=null; }
  document.body.classList.remove('playing');
  $('center').classList.remove('live');
  $('status').classList.remove('on');
  setStatus('400MS · STANDBY');
  $('btn-stop').disabled=true;
}
// audio can't resume without a user gesture in most browsers; unlock on first interaction
async function unlockAudio(){
  try{
    if(typeof Tone==='undefined') return;
    await Tone.start();
    if(!audio) audio=buildAudio();
  }catch(e){ console.warn('audio unavailable',e); }
}

function begin(){ if(!running) startTransport(); unlockAudio(); }
$('scrim').onclick    = begin;     // click anywhere on the start screen
$('begin').onclick    = begin;     // the centre play button
$('btn-stop').onclick = stop;
window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); begin(); }
});

/* --- idle placeholder scope before START (replaced by real blocks on connect) --- */
let seedBlock, seedNotes;
for(let i=0;i<HIST;i++){ seedBlock = nextBlock(false); pushHistory(seedBlock); }
seedNotes = blockToNotes(seedBlock);
targetLoad = loadDisp = seedBlock.load;
updateReadout(seedBlock, seedNotes);

/* --- render loop --------------------------------------------------------- */
const t0 = performance.now();
function render(){
  resize();
  if(gl && prog){
    if(texDirty) uploadHistory();
    const now = performance.now();
    const beat = running ? Math.max(0,Math.min(1,(now-lastTick)/BLOCK_MS)) : 0;
    loadDisp += (targetLoad - loadDisp)*0.12;
    pulseEnv *= 0.92; if(pulseEnv<0.01) pulseEnv=0;

    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, (now-t0)*0.001);
    gl.uniform1f(uLoad, loadDisp);
    gl.uniform1f(uBeat, beat);
    gl.uniform1f(uPulse, pulseEnv);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  requestAnimationFrame(render);
}
if(initGL()){ resize(); render(); }
/* visuals run on load (static, prefilled); the start screen waits for a click. */
</script>
</body>
